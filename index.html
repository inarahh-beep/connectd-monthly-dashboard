<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connectd — Monthly Dashboard</title>
<style>
  :root {
    --red: #f60039;
    --dark: #5d0027;
    --green: #51e668;
    --bg: #f7f6f5;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: linear-gradient(135deg, var(--dark) 0%, var(--red) 100%);
    border-radius: 24px;
    padding: 56px 64px;
    max-width: 560px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(93,0,39,0.25);
  }
  .logo-ring {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    font-size: 28px;
  }
  h1 {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .sub {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
    margin-bottom: 36px;
  }
  .badge {
    display: inline-block;
    background: var(--green);
    color: var(--dark);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 18px;
    border-radius: 999px;
    letter-spacing: 0.5px;
    margin-bottom: 36px;
  }
  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.15);
    margin: 0 0 28px;
  }
  .meta {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    line-height: 1.8;
  }
  .meta a {
    color: var(--green);
    text-decoration: none;
  }
  .meta a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-ring">📊</div>
    <h1>Connectd Monthly Dashboard</h1>
    <p class="sub">
      This page publishes automatically on the 1st of each month
      with the latest LinkedIn and Instagram analytics for Connectd.
    </p>
    <div class="badge">COMING SOON — FIRST ISSUE JULY 2026</div>
    <hr class="divider"/>
    <div class="meta">
      Built with <a href="https://www.anthropic.com/claude" target="_blank">Claude</a> ·
      Data from LinkedIn Page Admin &amp; Apify<br/>
      <a href="https://www.linkedin.com/company/connectd-co/" target="_blank">linkedin.com/company/connectd-co</a> ·
      <a href="https://www.instagram.com/connectduk/" target="_blank">@connectduk</a>
    </div>
  </div>
</body>
</html>
